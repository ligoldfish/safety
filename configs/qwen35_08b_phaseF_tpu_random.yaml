seed: 42

model:
  name: Qwen3.5-0.8B
  path: ../models/Qwen3.5-0.8B
  device_map: ""
  torch_dtype: float32
  runtime_backend: tpu
  runtime_device: xla
  trust_remote_code: true
  local_files_only: true
  attn_implementation: ""

inputs:
  train_split: ../data/processed/alignment_set.jsonl
  val_split: ../data/processed/analysis_val_set.jsonl
  train_targets_dir: ../outputs/qwen35_08b_phase1_tpu/student_targets/student_safe_targets_alignment
  val_targets_dir: ../outputs/qwen35_08b_phase1_tpu/student_targets/student_safe_targets_val
  pairing_path: ../outputs/qwen35_08b_phase1_tpu/layer_pairing/teacher_student_layer_pairs.json

lora:
  rank: 8
  alpha: 8.0
  dropout: 0.05
  target_modules:
    - self_attn.v_proj
    - self_attn.o_proj

optim:
  epochs: 1
  batch_size: 16
  micro_batch_size: 1
  learning_rate: 0.00005
  weight_decay: 0.0
  layer_loss_weight: 0.5
  max_length: 1024
  max_new_tokens: 256
  log_every_steps: 1

target:
  mode: random_same_norm
  random_seed: 2042
  match_l2_norm: true

output:
  output_root: ../outputs/qwen35_08b_phase1_tpu/training_random_same_norm
