seed: 42

model:
  name: Qwen3.5-9B
  path: ../models/Qwen3.5-9B
  device_map: ""
  torch_dtype: bfloat16
  chat_template_enable_thinking: false
  runtime_backend: tpu
  runtime_device: xla
  trust_remote_code: true
  local_files_only: true
  attn_implementation: ""

adapter:
  manifest_path: ""
  checkpoint_path: ""

datasets:
  pan:
    path: ../data/processed/pan_test_set.jsonl
    split: test
    max_samples: 0
    shuffle: false
    enabled: true
    placeholder_ok: true
    max_new_tokens: 2048
    initial_max_new_tokens: 0
  mmlu:
    path: ../data/benchmarks/mmlu
    split: test
    max_samples: 0
    shuffle: false
    enabled: false
    placeholder_ok: true
    max_new_tokens: 512
    initial_max_new_tokens: 0
  gsm8k:
    path: ../data/benchmarks/gsm8k
    split: test
    max_samples: 0
    shuffle: false
    enabled: false
    placeholder_ok: true
    max_new_tokens: 512
    initial_max_new_tokens: 0
  humaneval:
    path: ../data/benchmarks/humaneval
    split: test
    max_samples: 0
    shuffle: false
    enabled: false
    placeholder_ok: true
    max_new_tokens: 1024
    initial_max_new_tokens: 0
    exec_timeout_seconds: 3
  mbpp:
    path: ../data/benchmarks/mbpp
    split: test
    max_samples: 0
    shuffle: false
    enabled: false
    placeholder_ok: true
    max_new_tokens: 1024
    initial_max_new_tokens: 0
    exec_timeout_seconds: 3

runtime:
  max_length: 4096
  batch_size: 2

output:
  output_root: ../outputs/baselines/no_sft_qwen35_9b_tpu
